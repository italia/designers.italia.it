        - name: TextImageCta
          # title: 
          text: |
            Durante l'incontro abbiamo esplorato come progettare API di qualità che abilitano servizi pubblici interoperabili, seguendo gli step suggeriti da Developers Italia: ricerca, sviluppa, verifica, pubblica. Abbiamo presentato il [catalogo api.gov.it](https://www.api.gov.it/) per la ricerca delle API, il [catalogo nazionale della semantica dei dati schema.gov.it](https://www.schema.gov.it/) e le [buone pratiche per nominare e descrivere le API](https://italia.github.io/pdnd-guida-nomenclatura-eservice/).

            A seguire, una sessione dimostrativa con gli strumenti per garantire la qualità sintattica e semantica delle API a disposizione degli sviluppatori: [API OAS Checker](https://italia.github.io/api-oas-checker/) per verificare la conformità al Modello d'Interoperabilità (ModI) definito dalle Linee Guida AgID, e [Schema Editor](https://teamdigitale.github.io/dati-semantic-schema-editor/latest/) per creare e modificare gli schemi dati OpenAPI con la semantica nazionale.
          
          ctas:
          - label: Approfondisci il tema interoperabilità su Developers Italia
