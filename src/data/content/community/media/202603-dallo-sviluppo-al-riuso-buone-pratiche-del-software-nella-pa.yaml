        - name: TextImageCta
          # title: 
          text: |
            L’incontro è stato un’occasione di confronto tra amministrazioni pubbliche su approcci, strumenti ed esperienze per favorire il riuso del software e migliorare la qualità dei progetti digitali pubblici. Tra i temi affrontati, le linee guida normativa e il valore del riuso per ottimizzare le risorse, evitare duplicazioni e promuovere la collaborazione tra enti.

            Nel corso dell’evento sono state presentate due soluzioni a riuso, [UniContr](https://developers.italia.it/it/software/ea2d2b61-acff-49f0-98c1-8f1b1bd666b3) e [uniTicket](https://developers.italia.it/it/software/13221983-d9e9-4c88-928c-23240ef55dac), insieme a casi concreti e riflessioni su modelli di sviluppo aperto, gestione e manutenzione del software. Il Dipartimento ha lanciato un nuovo [canale di supporto per gli enti nell'utilizzo e nella pubblicazione di software a riuso](https://padigitale2026.gov.it/supporto/richiedi-assistenza), selezionando l'argomento 'Open source'.

            L’iniziativa è stata anche un’occasione per invitare enti e organizzazioni a **segnalare buone pratiche di software open source**, contribuendo alla raccolta attraverso il questionario dedicato.
          
          ctas:
