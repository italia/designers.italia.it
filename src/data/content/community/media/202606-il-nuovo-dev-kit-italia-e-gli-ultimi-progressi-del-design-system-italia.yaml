        - name: TextImageCta
          # title: 
          text: |
            Durante l'incontro abbiamo scoperto ed esplorato in anteprima prima del rilascio ufficiale il nuovo [Dev Kit Italia](/design-system/come-iniziare/per-sviluppatori/), il nuovo strumento trasversale e versatile, per sviluppare interfacce digitali usabili e accessibili. Il kit, basato su tecnologia Web Component, è indipendente dai framework di sviluppo ed è stato progettato per adattarsi alle preferenze degli sviluppatori e per durare nel tempo. Inoltre, sono stati condivisi gli importanti aggiornamenti della versione 3 di Bootstrap Italia, con uno sguardo ai più recenti sviluppi del [design system .italia](/design-system/) per la progettazione e lo sviluppo di servizi pubblici digitali.

