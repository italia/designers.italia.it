        - name: TextImageCta
          text: |
            Designers Italia presenterà l'evoluzione del design system .italia, il suo potenziale nel **migliorare l'accessibilità di siti e servizi pubblici digitali**, e la visione di un patrimonio di **risorse open source** costruite grazie al contributo della community nel prossimo webinar dal titolo “Design system .italia: interfacce pubbliche più accessibili, by design”. A seguire, la **Scuola Normale Superiore** racconterà un esempio concreto di **adozione del design system** nella propria realtà istituzionale. 

            **Ultimo appuntamento del ciclo GARR "Accessibilità digitale: da obbligo a opportunità"**, il webinar porta in primo piano Design system .italia e come l'accessibilità viene integrata by design negli strumenti, in modo che chi li adotta parta già by default da una base solida. 

            GARR è la rete nazionale dedicata alla **comunità dell'istruzione, della ricerca e della cultura**. Tra i suoi obiettivi c’è quello di sviluppare servizi innovativi per le attività quotidiane di docenti, ricercatori e studenti. Il programma del ciclo di webinar ha trattato temi come l’accessibilità dei contenuti web, dei documenti PDF e dei contenuti multimediali, il quadro normativo italiano ed europeo, le WCAG, le WAI-ARIA e l’Universal Design for Learning. 

