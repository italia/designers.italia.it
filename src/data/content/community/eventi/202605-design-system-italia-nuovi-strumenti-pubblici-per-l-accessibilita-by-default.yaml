        - name: TextImageCta
          text: |
            Per l’**appuntamento annuale sui temi dell’accessibilità** gli esperti del Dipartimento per la trasformazione digitale presenteranno **un excursus sull'ultimo anno di lavoro**: dal workshop degli Accessibility Days 2025, in cui quaranta partecipanti hanno testato dal vivo i componenti del design system, agli strumenti oggi a disposizione della Pubblica Amministrazione e dei fornitori per creare interfacce digitali pubbliche più semplici e usabili per tutte le persone. 
            
            **Quest'anno con una novità importante: il racconto dietro le quinte del Dev Kit Italia**, il nuovo kit di sviluppo del design system, che approfondiremo nel dettaglio nel [prossimo Community lab di Designers Italia](). Il kit è basato sugli standard web component, **con l'accessibilità integrata by design** attraverso verifiche esperte iterative, componente per componente, lungo tutto il processo di sviluppo, e metodi per guidare chi lo adotta verso un'implementazione accessibile. 
            
            Durante la manifestazione, il team del Dipartimento sarà presente **anche con un’attività partecipata sul sito di Developers Italia**, punto di riferimento per la community di chi sviluppa per la PA, che coinvolgerà in prima persona gli utenti attraverso **test di usabilità inclusivi**.
            
            “Accessibility Days” è una manifestazione gratuita che si svolge in Italia ogni anno, il cui scopo principale è di creare consapevolezza rispetto alla progettazione e all’utilizzo di tecnologie digitali in modo che siano fruibili da tutte e tutti, a prescindere dalle condizioni personali e contestuali che possano inficiare l'interazione con gli strumenti informatici. Coinvolge sviluppatori, progettisti, maker e addetti alla produzione di contenuti di una varietà di settori, tra cui quello pubblico.

