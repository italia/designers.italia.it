        - name: TextImageCta
          text: |
            Nel prossimo Community lab, il team di Designers Italia presenterà un’**anteprima di Dev Kit Italia**, il nuovo strumento trasversale e versatile, per sviluppare interfacce digitali usabili e accessibili. Il kit, basato su tecnologia Web Component, è indipendente dai framework di sviluppo ed è stato **progettato per adattarsi alle preferenze degli sviluppatori e per durare nel tempo**. 

            Proseguono anche i lavori di miglioramento di **Bootstrap Italia**, e in quest’occasione saranno condivisi gli importanti aggiornamenti della **versione 3**. 

            Questo incontro sarà un’importante occasione per imparare a conoscere le novità di questi strumenti prima del rilascio ufficiale e permettere all’intera community di contribuire al miglioramento del design system .italia.
            
            I community lab sono incontri online dedicati alla condivisione di conoscenze e migliori pratiche sulla progettazione e sviluppo efficace dei servizi pubblici digitali con gli esperti che curano l’evoluzione delle risorse di Designers e Developers Italia.

