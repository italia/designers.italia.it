        - name: TextImageCta
          text: |
            Nel prossimo Community Lab di Developers Italia esploriamo insieme come progettare API di qualità che abilitano servizi pubblici realmente interoperabili, realizzando il principio once-only (unicità dell’invio). 
            
            Dopo un'**introduzione al valore dell'interoperabilità e al concetto di qualità semantica e sintattica delle API**, esploreremo insieme gli step suggeriti da Developers Italia per la progettazione di API di qualità (ricerca, sviluppa, verifica, pubblica) e come 
            una nomenclatura e una descrizione accurate le rendano più facili da trovare, comprendere e utilizzare.
            Il cuore dell'incontro sarà una **sessione interattiva con gli strumenti messi a disposizione per gli sviluppatori**: dal Catalogo api.gov.it per la ricerca delle API, al Catalogo Nazionale della Semantica dei dati (schema.gov.it), fino all'API OAS Checker per la 
            verifica sintattica della conformità al Modello d'Interoperabilità (ModI) definito dalle Linee Guida AgID. 
            
            I community lab sono incontri online dedicati alla condivisione di conoscenze e migliori pratiche sulla progettazione e sviluppo efficace dei servizi pubblici digitali con gli esperti che curano l’evoluzione delle risorse di Designers e Developers Italia.

