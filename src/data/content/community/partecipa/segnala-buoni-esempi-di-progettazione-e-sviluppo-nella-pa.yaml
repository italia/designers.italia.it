  # ///////////////////
  # SECTION EDITORIAL
  # ///////////////////
  sectionsEditorial :


    - title: Aiutaci a collezionare buoni esempi #C
      menu: false
      centered: true
      background: null
      #text: | #C

      components:

        # TXT BLOCK
        - name: TextImageCta
          #title: Aiutaci a migliorare le risorse per progettare servizi pubblici digitali #C
          text: | #C
            Vogliamo raccogliere **esempi concreti di siti**, **servizi digitali** e **software per la Pubblica Amministrazione**, realizzati seguendo le linee guida e le buone pratiche di design e sviluppo promosse da Designers Italia e Developers Italia.

            Gli esempi raccolti potranno anche essere utilizzati per iniziative di divulgazione, come articoli di approfondimento, eventi o materiali formativi, con l’obiettivo di valorizzare buone pratiche di progettazione in ambito pubblico e farle conoscere ad altre amministrazioni e professionisti del settore.


        - name: TextImageCta
          title: Quali esempi cerchiamo #C
          text: | #C
            - Siti internet o servizi digitali della PA realizzati usando il design system .italia.
            - Software sviluppato per la PA e pubblicato su un repository pubblico.
            - Esperienze di progettazione inclusive e accessibili.
            - Implementazione dei Modelli di design per Comuni, scuole, ASL o musei civici.

            Siamo interessati a scoprire le sfide e i risultati raggiunti per capire anche come le nostre risorse hanno contribuito a raggiungere gli obiettivi di progetto.

            

        # TXT + IMG + CTA BLOCK
        - name: TextImageCta
          # image: /images/400x300.png #I
          # alt: Alt lorem ipsum #C
          # specular: true
          title: Inviaci un esempio #C
          headingLevel: 3
          text: | #C
            Compila un form di 5 minuti e rispondi alle nostre domande. **Assicurati di avere a disposizione un link pubblico** al sito, servizio o repository dove è pubblicato il software.

            
          ctas:
          - label: Compila il form #C
            screenReaderText: " (si apre in una nuova finestra)" #C
            url: https://ec.europa.eu/eusurvey/runner/buonepraticheDesItDevIT #M
            blank: true #M #C true if new tab for external links
            icon:
              icon: sprites.svg#it-external-link #C #I #it-arrow-right | it-external-link for external links
              color: primary
              align: middle
              hidden: true
              size: sm
              addonClasses: ms-2
