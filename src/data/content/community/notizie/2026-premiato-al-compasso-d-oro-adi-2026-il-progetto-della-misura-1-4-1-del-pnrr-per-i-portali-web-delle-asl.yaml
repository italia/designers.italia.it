        - name: TextImageCta
          noSpace: false
          text: | 
            Il Modello di sito web informativo per le Aziende Sanitarie Locali (ASL) ha ricevuto la **Menzione d’Onore** alla XXIX edizione del Premio Compasso d’Oro ADI, uno dei più autorevoli riconoscimenti nel campo del design.
            
            Il premio, assegnato dalla giuria internazionale dell’Associazione per il Disegno Industriale (ADI) in seguito alla [selezione nell'ADI Design Index 2024](https://designers.italia.it/community/notizie/20241104-adi-design-index/), rappresenta uno dei principali riconoscimenti italiani dedicati alla qualità di **progetti, prodotti e servizi che contribuiscono all’innovazione e al miglioramento della società attraverso il design**.
            
            Le opere insignite del Compasso d’Oro e della Menzione d’Onore entrano inoltre a far parte della Collezione Storica Compasso d’Oro ADI, dichiarata dal Ministero della Cultura di “**eccezionale interesse artistico e storico**”.
            
            Questo riconoscimento per la Pubblica Amministrazione segue l’assegnazione del [Compasso d’Oro 2022 all’app IO](https://innovazione.gov.it/notizie/articoli/compasso-d-oro-premiata-app-io/) e conferma la crescente **rilevanza del design nella trasformazione digitale della Pubblica Amministrazione, sottolineando il contributo innovativo di Designers Italia nella progettazione di servizi pubblici più accessibili, chiari e inclusivi**.
            
            ## Un modello per migliorare l’esperienza digitale dei servizi sanitari

            Sviluppato nell’ambito della Misura **1.4.1 del PNRR**, il [modello ASL](https://designers.italia.it/modelli/aziende-sanitarie-locali/) nasce per supportare le Aziende Sanitarie Locali nella progettazione di siti web più accessibili, chiari e orientati ai bisogni delle persone.
            
            Il modello mette a disposizione **tutte le risorse necessarie a progettare il sito** di diverse tipologie di enti e strutture sanitarie, aiutando le amministrazioni a offrire informazioni e servizi digitali più comprensibili, coerenti e facili da utilizzare, anche nei momenti di maggiore fragilità o urgenza per cittadini e pazienti.
            
            Questo modello di sito è stato realizzato con il supporto di [Tangible](https://tangible.is/), società specializzata nella progettazione di prodotti digitali, **attraverso un percorso di co-creazione** che ha incluso tutti gli attori coinvolti nell’erogazione di servizi sanitari e l'**ascolto attivo dei bisogni della cittadinanza**.

            ## Le esperienze delle ASL che hanno adottato il modello

            Nella community call del 28 maggio 2025, l’ASP di Siracusa e l’AUSL di Ferrara hanno raccontato il percorso di progettazione dei loro servizi sanitari utilizzando il modello.
            

