  sectionsEditorial:
    - full: true
      noSpace: false
      paddingLeft: true
      title: Semplifica la comprensione e l’accesso ai dati
      #text: Prima di essere “istituzione”, la PA è fatta di persone e parla alle persone con l’obiettivo di essere vicina, semplice e utile
      background: null
      components:
        - name: TextImageCta
          noSpace: true
          # title:
          text: |
            La visualizzazione dati, in inglese *data visualization*, è la **rappresentazione di informazioni quantitative e qualitative** attraverso l’uso di punti, linee, coordinate, numeri, simboli, parole e colori. Ne sono esempi i grafici e i sistemi di grafici.

            Rappresentare i dati con forme e colori, invece che soltanto in tabelle, ti permette di:
            - rendere le informazioni più comprensibili e usabili;
            - catturare l’attenzione dell’utente;
            - stabilire un rapporto di fiducia, attraverso la trasparenza. 

            Le amministrazioni, infatti, devono rendere i dati accessibili e riutilizzabili attraverso le tecnologie digitali, come previsto dall'[articolo 50 del Codice dell’amministrazione digitale](https://docs.italia.it/italia/piano-triennale-ict/codice-amministrazione-digitale-docs/it/v2021-07-30/_rst/capo_V-sezione_I-articolo_50.html).

    - full: true
      noSpace: false
      paddingLeft: true
      background: null
      components:

        - name: TextImageCta
          title: Considera pubblico e obiettivo
          headingLevel: 2
          text: |
            Per progettare una visualizzazione efficace, considera il pubblico a cui ti rivolgi e l’obiettivo che vuoi raggiungere. Questi elementi ti aiutano a scegliere la tipologia di visualizzazione e il linguaggio più adatti. 

        - name: Table
          title: Esempi
          responsive: table-responsive-md
          addonClasses:
          head:
            - text: Pubblico
            - text: Obiettivo
            - text: Tipologia di visualizzazione
            - text: Linguaggio
          rows:
            - cols:
              - text: **Generalista** (poca familiarità con l’argomento trattato e la visualizzazione dati) 
              - text: Informare, Educare
              - text: Visualizzazioni singole guidate con grafici semplici
              - text: Linguaggio semplice senza tecnicismi 
            - cols:
              - text: **Esperto** (familiarità con l’argomento trattato e la visualizzazione dati)
              - text: Analizzare, Monitorare
              - text: Visualizzazioni complesse con più viste o dashboard
              - text: Puoi usare tecnicismi, spiegandoli quando necessario
           
              
    - full: true
      noSpace: true
      paddingLeft: true
      background: null
      components:
        - name: TextImageCta
          title: Usa il tono delle istituzioni in modo appropriato
          headingLevel: 2

        #1
        - name: TextImageCta
          title: Sii autorevole senza aggiungere complessità
          noSpace: true
          text: |
            **Usa un tono istituzionale**, diretto e adatto a un contesto amministrativo, ma **senza abusare di termini burocratici non necessari**. Anche quando ti riferisci a norme e prescrizioni, abbi cura di citarle con precisione pur parlando in modo chiaro, con un lessico corretto ma semplice.

        - name: Table
          noSpace: true
          responsive: table-responsive-md
          addonClasses: fixed mb-5
          head:
            - tag:
                label: VA BENE
                addonClasses: bg-success fw-bold
            - tag:
                label: NON VA BENE
                addonClasses: bg-danger fw-bold
          rows:
            - cols:
              - text: |
                  Tono istituzionale: "Richiedi al comune la rettifica dei dati inesatti presenti sulla scheda anagrafica."
              - text: |
                  Tono burocratico: "Il servizio per inviare una richiesta di rettifica dei dati anagrafici in caso di errori sulle informazioni presenti nella scheda anagrafica, dovuti ad errori materiali o ad errate trascrizioni rispetto a quanto riportato nei documenti in proprio possesso."
            - cols:
              - text: null
              - text: |
                  Tono informale: "Informazioni sbagliate nella tua scheda anagrafica? Falle correggere con la richiesta di rettifica."

        #2
        - name: TextImageCta
          title: Rivolgiti a chi legge con il "tu"
          noSpace: true
          text: |
            **Parla all'interlocutore in modo diretto usando il "tu”**, evitando tanto il "lei" e i formalismi quanto la forma impersonale, perché complicano la costruzione del testo.

        - name: Table
          noSpace: true
          responsive: table-responsive-md
          addonClasses: fixed mb-5
          head:
            - tag:
                label: VA BENE
                addonClasses: bg-success fw-bold
            - tag:
                label: NON VA BENE
                addonClasses: bg-danger fw-bold
          rows:
            - cols:
              - text: |
                  Tono diretto: "In base alle norme ISO/IEC Directives, Part 3 per la stesura dei documenti tecnici, le Linee guida di design indicano le regole che hai l'obbligo di rispettare in ogni fornitura di siti e servizi digitali per la PA, quelle che dovresti valutare con attenzione prima di scegliere approcci alternativi e quelle facoltative."
              - text: |
                  Tono impersonale: "Conformemente alle norme ISO/IEC Directives, Part 3 per la stesura dei documenti tecnici, le Linee guida di design forniscono indicazioni che devono essere obbligatoriamente rispettate per la realizzazione di siti internet e servizi digitali della PA, quelle opzionali e quelle per cui si rende necessaria un’attenta valutazione."

        #3
        - name: TextImageCta
          title: Rispetta le differenze
          noSpace: true
          text: |
            **Non rafforzare stereotipi** di genere, razzisti, abilisti o legati all'età.
            
        - name: Table
          noSpace: true
          responsive: table-responsive-md
          addonClasses: fixed mb-5
          head:
            - tag:
                label: VA BENE
                addonClasses: bg-success fw-bold
            - tag:
                label: NON VA BENE
                addonClasses: bg-danger fw-bold
          rows:
            - cols:
              - text: “La documentazione ufficiale che ti guida nella progettazione per la PA, mettendo le persone al centro.”
              - text: “La documentazione ufficiale che ti guida nella progettazione per la PA, mettendo i cittadini al centro.”
            - cols:
              - text: “La norma a cui riferirti per favorire e semplificare l'accesso delle persone con disabilità agli strumenti informatici.”
              - text: “La norma a cui riferirti per favorire e semplificare l'accesso dei disabili agli strumenti informatici.”


